<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background-color: rgba(0,0,0,0.8);
        }

        header h1 {
            color: red;
        }

        header button {
            background-color: red;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
        }

        .banner {
            height: 400px;
            background: url('https://via.placeholder.com/1200x400') no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding-left: 50px;
        }

        .banner h2 {
            font-size: 40px;
        }

        .row {
            padding: 20px 50px;
        }

        .row h3 {
            margin-bottom: 10px;
        }

        .movies {
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }

        .movies img {
            width: 150px;
            border-radius: 5px;
            transition: transform 0.3s;
        }

        .movies img:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<header>
    <h1>NETFLIX</h1>
    <button>Sign In</button>
</header>

<section class="banner">
    <h2>Featured Movie</h2>
</section>

<section class="row">
    <h3>Popular on Netflix</h3>
    <div class="movies">
        <img src="https://via.placeholder.com/150x220">
        <img src="https://via.placeholder.com/150x220">
        <img src="https://via.placeholder.com/150x220">
        <img src="https://via.placeholder.com/150x220">
    </div>
</section>

<section class="row">
    <h3>Trending Now</h3>
    <div class="movies">
        <img src="https://via.placeholder.com/150x220">
        <img src="https://via.placeholder.com/150x220">
        <img src="https://via.placeholder.com/150x220">
        <img src="https://via.placeholder.com/150x220">
    </div>
</section>

</body>
</html>
